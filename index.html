<!DOCTYPE html>
<html>
  <head>
    <title>ELEG5802 - Surgery Robot AR Demo</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      .controls {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        width: 85%; background: rgba(0,0,0,0.8); color: white; padding: 15px;
        border-radius: 12px; z-index: 999; font-family: sans-serif;
      }
      input { width: 100%; margin: 10px 0; accent-color: #007bff; }
      .label-group { display: flex; justify-content: space-between; font-size: 14px; }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">
    <div class="controls">
      <div class="label-group">
        <span>Robot Rotation (RCM)</span>
        <span id="rotVal">0°</span>
      </div>
      <input type="range" id="rotateRange" min="-90" max="90" value="0">
      
      <div class="label-group">
        <span>Tool Depth</span>
        <span id="depthVal">0.00m</span>
      </div>
      <input type="range" id="depthRange" min="-0.2" max="0.2" step="0.01" value="0">
      
      <div id="status" style="font-size: 12px; color: #aaa; margin-top: 5px;">
        Status: Tracking Hiro Marker...
      </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
      
      <a-assets>
        <a-asset-item id="robotModel" src="rcm_1.glb"></a-asset-item>
        <a-asset-item id="headModel" src="head.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="hiro">
        <a-entity id="robotArm" 
                  gltf-model="#robotModel" 
                  position="0 0 0" 
                  scale="0.005 0.005 0.005"
                  rotation="0 0 0">
        </a-entity>
        
        <a-entity id="patientHead"
                  gltf-model="#headModel" 
                  position="0 0.1 0" 
                  scale="0.05 0.05 0.05"
                  material="opacity: 0.5; transparent: true">
        </a-entity>

        <a-sphere position="0 0.1 0" radius="0.01" color="red"></a-sphere>
      </a-marker>

      <a-entity light="type: ambient; intensity: 1.0;"></a-entity>
      <a-entity light="type: directional; position: 1 2 1; intensity: 0.8;"></a-entity>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      const arm = document.querySelector('#robotArm');
      const rotateInp = document.querySelector('#rotateRange');
      const depthInp = document.querySelector('#depthRange');
      
      const rotValDisplay = document.querySelector('#rotVal');
      const depthValDisplay = document.querySelector('#depthVal');

      function updateRobot() {
        const rot = rotateInp.value;
        const depth = parseFloat(depthInp.value);
        
        // 更新旋转 (绕Y轴)
        arm.setAttribute('rotation', `0 ${rot} 0`);
        
        // 更新位移 (根据你的模型朝向，可能需要改 y 或 z)
        // 这里我们修改 position，但 Scale 依然会保持 HTML 里的 0.005
        arm.setAttribute('position', {x: 0, y: depth, z: 0});
        
        // 更新数值显示
        rotValDisplay.innerText = rot + "°";
        depthValDisplay.innerText = depth.toFixed(2) + "m";
      }

      rotateInp.addEventListener('input', updateRobot);
      depthInp.addEventListener('input', updateRobot);
    </script>
  </body>
</html>
